<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Apartments — Last 3 Days</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── LEFT SIDEBAR ─────────────────────────── -->
  <aside id="sidebar">

    <div id="sidebar-header">
      <div id="header-top">
        <div>
          <h1>NYC Rentals</h1>
          <p id="subtitle">New listings from the last 3 days</p>
        </div>
        <div id="source-badge">
          <span>via</span>
          <strong>Craigslist</strong>
        </div>
      </div>

      <div id="stats-bar">
        <div class="stat">
          <span class="stat-value" id="count-value">—</span>
          <span class="stat-label">listings</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-value" id="today-value">—</span>
          <span class="stat-label">today</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-value" id="median-value">—</span>
          <span class="stat-label">median</span>
        </div>
      </div>
    </div>

    <div id="listing-loading">
      <div class="spinner"></div>
      <span>Fetching listings...</span>
    </div>

    <div id="listing-error" class="hidden">
      <div class="error-icon">⚠</div>
      <div id="error-message"></div>
      <div class="error-hint">Check the server console for details.</div>
    </div>

    <ul id="listing-list" class="hidden"></ul>

  </aside>

  <!-- ── MAP ──────────────────────────────────── -->
  <main id="map-container">
    <div id="map"></div>
    <div id="map-footer">
      <span id="updated-label">Fetching data...</span>
    </div>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet MarkerCluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script src="app.js"></script>
</body>
</html>
